{% extends "base.html" %}
{% block title %}Chat — LLM Obs{% endblock %}

{% block content %}
<style>
  /* Markdown prose styles for assistant messages */
  .prose p               { margin: 0.5em 0; }
  .prose p:first-child   { margin-top: 0; }
  .prose p:last-child    { margin-bottom: 0; }
  .prose ul, .prose ol   { margin: 0.5em 0 0.5em 1.25em; }
  .prose li              { margin: 0.2em 0; }
  .prose strong          { font-weight: 700; }
  .prose em              { font-style: italic; }
  .prose h1,.prose h2,.prose h3 { font-weight: 700; margin: 0.75em 0 0.25em; line-height: 1.3; }
  .prose h1              { font-size: 1.2em; }
  .prose h2              { font-size: 1.1em; }
  .prose h3              { font-size: 1em; }
  .prose code            { background: #f3f4f6; border-radius: 3px; padding: 0.1em 0.3em; font-family: monospace; font-size: 0.88em; }
  .prose pre             { background: #1e1e2e; color: #cdd6f4; border-radius: 6px; padding: 0.75em 1em; overflow-x: auto; margin: 0.5em 0; }
  .prose pre code        { background: none; padding: 0; color: inherit; font-size: 0.85em; }
  .prose blockquote      { border-left: 3px solid #e5e7eb; padding-left: 0.75em; color: #6b7280; margin: 0.5em 0; }
  .prose a               { color: #4f46e5; text-decoration: underline; }
  .prose hr              { border: none; border-top: 1px solid #e5e7eb; margin: 0.75em 0; }
  .prose table           { border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 0.9em; }
  .prose th, .prose td   { border: 1px solid #e5e7eb; padding: 0.3em 0.6em; text-align: left; }
  .prose th              { background: #f9fafb; font-weight: 600; }
</style>

<div class="flex h-screen">
  <!-- Conversation list -->
  <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
    <div class="p-4 border-b">
      <button onclick="newChat()" class="w-full bg-indigo-600 text-white rounded px-3 py-2 text-sm hover:bg-indigo-700">
        + New Chat
      </button>
    </div>
    <div id="conv-list" class="overflow-y-auto flex-1 p-2 space-y-1">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Chat panel -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="bg-white border-b px-6 py-3 flex items-center gap-4 flex-shrink-0">
      <select id="provider-select" class="border rounded px-2 py-1 text-sm" onchange="onProviderChange()">
        {% for p, models in providers.items() %}
        <option value="{{ p }}">{{ p|capitalize }}</option>
        {% endfor %}
      </select>
      <select id="model-select" class="border rounded px-2 py-1 text-sm">
        {% for p, models in providers.items() %}
          {% for m in models %}
          <option value="{{ m }}" data-provider="{{ p }}">{{ m }}</option>
          {% endfor %}
        {% endfor %}
      </select>
      <span id="status-indicator" class="text-xs text-gray-400"></span>
      <button id="cancel-btn" onclick="cancelChat()" class="hidden ml-auto text-xs bg-red-100 text-red-600 px-3 py-1 rounded hover:bg-red-200">
        ✕ Cancel
      </button>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4">
      <div class="text-center text-gray-400 text-sm mt-16" id="empty-state">
        Start a conversation by typing a message below.
      </div>
    </div>

    <!-- Input -->
    <div class="bg-white border-t p-4 flex-shrink-0">
      <div class="flex gap-2">
        <textarea
          id="msg-input"
          rows="2"
          placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
          class="flex-1 border rounded px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-300"
          onkeydown="handleKey(event)"
        ></textarea>
        <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 rounded hover:bg-indigo-700 text-sm">
          Send
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
// Configure marked for safe inline rendering
marked.setOptions({ breaks: true, gfm: true });

const providers = {{ providers_json | safe }};
let currentConvId = "{{ conv_id or '' }}";
let currentInferenceLogId = null;
let activeProvider = Object.keys(providers)[0] || "openai";

function renderMarkdown(text) {
  return marked.parse(text || "");
}

// Load conversations sidebar
async function loadConversations() {
  const resp = await fetch("/api/conversations");
  const convs = await resp.json();
  const list = document.getElementById("conv-list");
  list.innerHTML = convs.map(c => `
    <div onclick="loadConversation('${c.id}')" class="p-2 rounded cursor-pointer text-sm hover:bg-gray-100 ${c.id === currentConvId ? 'bg-indigo-50 border-l-2 border-indigo-500' : ''}">
      <div class="font-medium truncate">${escHtml(c.title)}</div>
      <div class="text-xs text-gray-400">${c.provider || ''} • ${timeAgo(c.updated_at)}</div>
    </div>
  `).join("");
}

async function loadConversation(convId) {
  currentConvId = convId;
  const resp = await fetch(`/api/conversations/${convId}`);
  const data = await resp.json();
  const msgs = document.getElementById("messages");
  document.getElementById("empty-state")?.remove();
  msgs.innerHTML = "";
  (data.messages || []).forEach(m => appendMessage(m.role.toLowerCase(), m.content, false));
  loadConversations();
  history.replaceState({}, "", `/chat/${convId}`);
}

function newChat() {
  currentConvId = "";
  currentInferenceLogId = null;
  document.getElementById("messages").innerHTML = `
    <div class="text-center text-gray-400 text-sm mt-16" id="empty-state">Start a conversation by typing a message below.</div>
  `;
  history.replaceState({}, "", "/chat");
}

function onProviderChange() {
  const prov = document.getElementById("provider-select").value;
  activeProvider = prov;
  const modelSel = document.getElementById("model-select");
  const opts = [...modelSel.options];
  let first = true;
  opts.forEach(o => {
    const show = o.dataset.provider === prov;
    o.style.display = show ? "" : "none";
    if (show && first) { modelSel.value = o.value; first = false; }
  });
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";

  document.getElementById("empty-state")?.remove();

  const provider = document.getElementById("provider-select").value;
  const model = document.getElementById("model-select").value;

  appendMessage("user", text);
  const assistantDiv = appendMessage("assistant", "");
  const contentEl = assistantDiv.querySelector(".content");
  contentEl.innerHTML = '<span class="spinner"></span>';

  document.getElementById("status-indicator").textContent = "Streaming…";
  document.getElementById("cancel-btn").classList.remove("hidden");

  const es = new EventSource("/api/chat-stream?" + new URLSearchParams({
    message: text,
    conversation_id: currentConvId,
    provider,
    model,
  }));

  let buffer = "";

  es.addEventListener("meta", e => {
    const d = JSON.parse(e.data);
    currentConvId = d.conversation_id;
    currentInferenceLogId = d.inference_log_id;
  });

  es.addEventListener("token", e => {
    const d = JSON.parse(e.data);
    buffer += d.delta;
    // Render markdown live as tokens stream in
    contentEl.innerHTML = renderMarkdown(buffer);
    contentEl.className = "content prose text-sm";
    assistantDiv.scrollIntoView({ behavior: "smooth", block: "end" });
  });

  es.addEventListener("done", () => {
    // Final render once complete
    contentEl.innerHTML = renderMarkdown(buffer);
    contentEl.className = "content prose text-sm";
    finishStream(es);
  });

  es.addEventListener("cancelled", () => {
    contentEl.innerHTML = renderMarkdown(buffer) + '<p class="text-xs text-gray-400 mt-1">[cancelled]</p>';
    contentEl.className = "content prose text-sm";
    finishStream(es);
  });

  es.addEventListener("error", e => {
    try {
      const d = JSON.parse(e.data || "{}");
      contentEl.textContent = "Error: " + (d.message || "Unknown error");
    } catch {
      contentEl.textContent = "Connection error";
    }
    contentEl.className = "content text-sm text-red-500";
    finishStream(es);
  });

  es.onerror = () => {
    if (buffer) {
      contentEl.innerHTML = renderMarkdown(buffer);
      contentEl.className = "content prose text-sm";
    }
    finishStream(es);
  };
}

function finishStream(es) {
  es.close();
  document.getElementById("status-indicator").textContent = "";
  document.getElementById("cancel-btn").classList.add("hidden");
  currentInferenceLogId = null;
  loadConversations();
}

async function cancelChat() {
  if (!currentConvId || !currentInferenceLogId) return;
  await fetch(`/api/conversations/${currentConvId}/cancel`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ inference_log_id: currentInferenceLogId }),
  });
}

function appendMessage(role, content, scroll = true) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;

  const isUser = role === "user";
  const contentHtml = isUser
    ? `<span>${escHtml(content)}</span>`
    : `<div class="content prose text-sm">${renderMarkdown(content)}</div>`;

  div.innerHTML = `
    <div class="max-w-2xl rounded-lg px-4 py-3 text-sm ${isUser ? "bg-indigo-600 text-white" : "bg-white border border-gray-200"}">
      <div class="text-xs mb-1 opacity-50 font-medium">${role}</div>
      ${contentHtml}
    </div>
  `;
  msgs.appendChild(div);
  if (scroll) div.scrollIntoView({ behavior: "smooth", block: "end" });
  return div;
}

function escHtml(t) {
  return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function timeAgo(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (d < 1) return "just now";
  if (d < 60) return `${d}m ago`;
  if (d < 1440) return `${Math.floor(d/60)}h ago`;
  return `${Math.floor(d/1440)}d ago`;
}

// Init
onProviderChange();
loadConversations();
{% if conv_id %}loadConversation("{{ conv_id }}");{% endif %}
</script>
{% endblock %}
